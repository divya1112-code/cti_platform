<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0d17;--bg2:#171428;--bg3:#1e1a35;
--gold:#f5c842;--gold2:rgba(245,200,66,0.14);--gold3:rgba(245,200,66,0.06);
--violet:#9b6dff;--violet2:rgba(155,109,255,0.14);
--green:#22d3a5;--green2:rgba(34,211,165,0.12);
--red:#ff6b6b;--red2:rgba(255,107,107,0.12);
--border:rgba(155,109,255,0.18);--border2:rgba(245,200,66,0.25);
--text:#f0ecff;--text2:#b8afd4;--text3:#6b5f8a;
}
body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
}
body::before{
    content:'';position:fixed;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--gold),var(--violet),var(--gold));
    background-size:200%;z-index:9999;
    animation:topbar 3s linear infinite;
}
@keyframes topbar{0%{background-position:0%}100%{background-position:200%}}
body::after{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(155,109,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(155,109,255,0.025) 1px,transparent 1px);
    background-size:60px 60px;pointer-events:none;z-index:0;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.03;pointer-events:none}

.login-wrap{
    position:relative;z-index:1;
    width:100%;max-width:440px;
    padding:20px;
}

.login-logo{
    text-align:center;margin-bottom:30px;
}
.logo-icon{
    width:70px;height:70px;border-radius:18px;
    background:linear-gradient(135deg,var(--gold),var(--violet));
    display:flex;align-items:center;justify-content:center;
    font-size:36px;margin:0 auto 14px;
    box-shadow:0 0 30px rgba(245,200,66,0.4),0 0 60px rgba(155,109,255,0.2);
    animation:glow 3s ease infinite;
}
@keyframes glow{
    0%,100%{box-shadow:0 0 30px rgba(245,200,66,0.4)}
    50%{box-shadow:0 0 50px rgba(245,200,66,0.7),0 0 80px rgba(155,109,255,0.3)}
}
.logo-name{
    font-size:1.6rem;font-weight:700;
    background:linear-gradient(90deg,var(--gold),var(--violet));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:1px;
}
.logo-sub{font-size:0.75rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

.login-card{
    background:var(--bg2);
    border:1px solid var(--border2);
    border-radius:16px;
    padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.login-title{
    font-size:1.1rem;font-weight:600;color:var(--text);
    margin-bottom:6px;
}
.login-sub{font-size:0.78rem;color:var(--text3);margin-bottom:28px}

.form-group{margin-bottom:18px}
.form-label{
    display:block;font-size:0.7rem;font-weight:500;
    color:var(--text3);letter-spacing:1px;text-transform:uppercase;
    margin-bottom:7px;
}
.form-input{
    width:100%;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 16px;
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:0.9rem;
    outline:none;
    transition:all 0.2s;
}
.form-input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(245,200,66,0.1);
    background:rgba(245,200,66,0.03);
}
.form-input::placeholder{color:var(--text3)}

.btn-login{
    width:100%;padding:13px;border-radius:8px;
    border:none;
    background:linear-gradient(90deg,var(--gold),var(--violet));
    color:#0f0d17;font-family:'Inter',sans-serif;
    font-size:0.88rem;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;
    cursor:pointer;transition:all 0.25s;
    margin-top:8px;position:relative;overflow:hidden;
}
.btn-login::before{
    content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    transition:left 0.5s;
}
.btn-login:hover::before{left:100%}
.btn-login:hover{
    opacity:0.9;transform:translateY(-2px);
    box-shadow:0 6px 22px rgba(245,200,66,0.35);
}

.error-box{
    background:var(--red2);border:1px solid rgba(255,107,107,0.25);
    border-radius:8px;padding:12px 16px;margin-bottom:18px;
    font-size:0.82rem;color:var(--red);display:flex;align-items:center;gap:8px;
}

.login-footer{
    text-align:center;margin-top:24px;
    font-size:0.72rem;color:var(--text3);
}

.credentials-hint{
    background:var(--gold3);border:1px solid rgba(245,200,66,0.15);
    border-radius:8px;padding:12px 16px;margin-top:18px;
    font-size:0.78rem;color:var(--text2);
}
.credentials-hint strong{color:var(--gold)}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div class="login-wrap">
    <div class="login-logo">
        <div class="logo-icon">🛡️</div>
        <div class="logo-name">CyberShield</div>
        <div class="logo-sub">Threat Intelligence Platform</div>
    </div>

    <div class="login-card">
        <div class="login-title">Welcome back</div>
        <div class="login-sub">Sign in to access the threat intelligence dashboard</div>

        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input"
                       placeholder="Enter username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input"
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">
                🔐 Sign In to Dashboard
            </button>
        </form>

        <div class="credentials-hint">
            <strong>Demo Credentials:</strong><br>
            Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>cybershield123</strong>
        </div>
    </div>

    <div class="login-footer">
        © 2026 CyberShield · DAV University · Divya
    </div>
</div>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cols = Math.floor(canvas.width / 20);
const drops = Array(cols).fill(1);
function draw() {
    ctx.fillStyle = 'rgba(15,13,23,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f5c842';
    ctx.font = '13px JetBrains Mono, monospace';
    drops.forEach((y, i) => {
        const c = String.fromCharCode(0x30A0 + Math.random() * 96);
        ctx.fillText(c, i * 20, y * 20);
        if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 60);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>

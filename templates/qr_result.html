<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberShield — QR Result</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0d17;--bg2:#171428;--bg3:#1e1a35;--gold:#f5c842;--gold2:rgba(245,200,66,0.14);--gold3:rgba(245,200,66,0.06);--violet:#9b6dff;--green:#22d3a5;--green2:rgba(34,211,165,0.12);--red:#ff6b6b;--red2:rgba(255,107,107,0.12);--rose:#f472b6;--border:rgba(155,109,255,0.18);--border2:rgba(245,200,66,0.25);--text:#f0ecff;--text2:#b8afd4;--text3:#6b5f8a;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--violet),var(--rose),var(--gold));background-size:300%;z-index:9999;animation:tb 4s linear infinite}
@keyframes tb{0%{background-position:0%}100%{background-position:300%}}
.box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px;text-align:center;max-width:500px;width:100%}
.icon{font-size:3rem;margin-bottom:16px}
.title{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:8px}
.sub{font-size:0.8rem;color:var(--text2);margin-bottom:20px}
.ioc-display{font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:var(--gold);background:var(--gold3);border:1px solid rgba(245,200,66,0.2);border-radius:8px;padding:12px 16px;margin-bottom:20px;word-break:break-all}
.btn-main{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:8px;background:linear-gradient(90deg,var(--gold),var(--violet));border:none;color:#0f0d17;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.25s;text-decoration:none;margin:5px}
.btn-main:hover{opacity:0.9;transform:translateY(-2px);box-shadow:0 6px 22px rgba(245,200,66,0.35)}
.btn-out{display:inline-flex;align-items:center;gap:7px;padding:12px 20px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;margin:5px}
.btn-out:hover{background:var(--bg3);color:var(--text)}
.error-box{background:var(--red2);border:1px solid rgba(255,107,107,0.25);border-radius:8px;padding:14px;margin-bottom:20px;font-size:0.82rem;color:var(--red)}
</style>
</head>
<body>
<div class="box">
    {% if ioc %}
    <div class="icon">🔍</div>
    <div class="title">QR Code Scanned Successfully!</div>
    <div class="sub">Extracted IOC from QR Code:</div>
    <div class="ioc-display">{{ ioc }}</div>
    <div>
        <form action="/analyze" method="POST" style="display:inline">
            <input type="hidden" name="ioc" value="{{ ioc }}">
            <button type="submit" class="btn-main">▶ Analyze This IOC</button>
        </form>
        <a href="/qr_page" class="btn-out">← Scan Another</a>
    </div>
    {% else %}
    <div class="icon">❌</div>
    <div class="title">No QR Code Found</div>
    <div class="error-box">Could not detect a QR code in the uploaded image. Please try a clearer image.</div>
    <a href="/qr_page" class="btn-main">← Try Again</a>
    <a href="/" class="btn-out">🏠 Dashboard</a>
    {% endif %}
</div>
</body>
</html>
